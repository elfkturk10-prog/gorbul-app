name: Build and Release GörBul APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Universal APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Configure Android & Firebase
        run: |
          # Android v1 embedding hatasını önlemek için android klasörünü sıfırdan kur.
          # Önce github'dan gelen özel dosyaları yedekle
          mkdir -p /tmp/android_backup/res/drawable
          cp android/app/google-services.json /tmp/android_backup/ || true
          cp -r android/app/src/main/res/drawable/* /tmp/android_backup/res/drawable/ || true
          
          # Eski/bozuk android klasörünü sil
          rm -rf android
          
          # Flutter 3.24 uyumlu yepyeni Android v2 projesi oluştur
          flutter create --platforms=android --org com.gorbul.app --project-name gorbul .
          
          # Yedekleri geri yükle
          cp /tmp/android_backup/google-services.json android/app/ || true
          cp -r /tmp/android_backup/res/drawable/* android/app/src/main/res/drawable/ || true
          
          # Uygulama adını düzelt
          sed -i 's/android:label="gorbul"/android:label="GörBul"/g' android/app/src/main/AndroidManifest.xml || true
          
          # flutter.sdk yolunu local.properties'e yaz (geolocator gibi plugin'ler buna ihtiyaç duyar)
          FLUTTER_SDK=$(flutter sdk-path)
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          
          # Root build.gradle düzenleme (ext properties ve buildscript)
          cat <<EOF > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.9.24'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
              // Geolocator ve diğer plugin'lerin SDK 35 hatalarını çözmek için ext tanımları
              ext {
                  compileSdkVersion = 35
                  targetSdkVersion = 35
                  minSdkVersion = 23
              }
          }
          
          rootProject.buildDir = "../build"
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(":app")
          }
          
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # settings.gradle - Modern Flutter Loader + GMS
          cat <<EOF > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("\$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.24" apply false
              id "com.google.gms.google-services" version "4.4.1" apply false
          }

          include ":app"
          EOF

          # app/build.gradle düzenleme (Namespace ve SDK tanımları)
          cat <<EOF > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "com.google.gms.google-services"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.gorbul.app"
              compileSdk 35

              defaultConfig {
                  applicationId "com.gorbul.app"
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName "1.0.0"
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source "../.."
          }
          EOF

          # Android Lisanslarını Onayla (Build başarısı için kritik)
          yes | flutter doctor --android-licenses || true

      # Tüm Android mimarileri için FAT/Evrensel APK (tek dosya, her cihazda çalışır)
      - name: Build APK
        run: flutter build apk --release --build-name=1.0.0 --build-number=1 --no-tree-shake-icons

      - name: Get Version Tag
        id: version
        run: echo "tag=v$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      # GitHub Release oluştur ve APK'yı yükle
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GörBul ${{ steps.version.outputs.tag }}"
          body: |
            ## GörBul - Kayıp Eşya Ağı

            Tüm Android cihazlarla uyumlu evrensel APK

            **Kurulum:**
            1. `app-release.apk` dosyasını indir
            2. Telefonda *Bilinmeyen kaynaklar*'a izin ver
            3. Yükle ve aç!
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Artifact olarak da yükle (yedek)
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorbul-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
