name: Build and Release GörBul APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Universal APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Configure Android & Firebase
        run: |
          # Backup special files
          mkdir -p /tmp/android_backup/res/drawable
          cp android/app/google-services.json /tmp/android_backup/ || true
          cp -r android/app/src/main/res/drawable/* /tmp/android_backup/res/drawable/ || true
          
          # Remove and recreate Android project (Restores essential build files correctly)
          rm -rf android
          flutter create --platforms=android --org com.gorbul --project-name app .
          
          # Restore backups
          cp /tmp/android_backup/google-services.json android/app/ || true
          cp -r /tmp/android_backup/res/drawable/* android/app/src/main/res/drawable/ || true
          
          # SURGICAL PATCHING (No aggressive overwrites)
          
          # 1. Add GMS to settings.gradle
          sed -i 's/plugins {/plugins {\n    id "com.google.gms.google-services" version "4.4.1" apply false/g' android/settings.gradle
          
          # 2. Add GMS to app build.gradle
          sed -i 's/id "dev.flutter.flutter-gradle-plugin"/id "dev.flutter.flutter-gradle-plugin"\n    id "com.google.gms.google-services"/g' android/app/build.gradle
          
          # 3. Force JVM 1.8 and Hardcode SDK versions (Bypasses all property resolution issues)
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/g' android/app/build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/g' android/app/build.gradle
          
          # Inject JVM options into android { ... } block
          sed -i '/android {/a \    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n    kotlinOptions {\n        jvmTarget = "1.8"\n    }' android/app/build.gradle
          
          # Fix App Name
          sed -i 's/android:label="app"/android:label="GörBul"/g' android/app/src/main/AndroidManifest.xml || true
          
          # Final build prep
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          yes | flutter doctor --android-licenses || true

      # Tüm Android mimarileri için FAT/Evrensel APK (tek dosya, her cihazda çalışır)
      - name: Build APK
        run: flutter build apk --release --build-name=1.0.0 --build-number=1 --no-tree-shake-icons

      - name: Get Version Tag
        id: version
        run: echo "tag=v$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      # GitHub Release oluştur ve APK'yı yükle
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GörBul ${{ steps.version.outputs.tag }}"
          body: |
            ## GörBul - Kayıp Eşya Ağı

            Tüm Android cihazlarla uyumlu evrensel APK

            **Kurulum:**
            1. `app-release.apk` dosyasını indir
            2. Telefonda *Bilinmeyen kaynaklar*'a izin ver
            3. Yükle ve aç!
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Artifact olarak da yükle (yedek)
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorbul-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
