name: Build and Release GörBul APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Universal APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Configure App Icon
        run: |
          cat <<EOF >> pubspec.yaml
          flutter_launcher_icons:
            android: "launcher_icon"
            ios: false
            image_path: "assets/icon/app_icon.png"
          EOF
          dart run flutter_launcher_icons || true

      - name: Configure Android & Firebase
        run: |
          # Android altyapısını oluştur (eksikse)
          flutter create . --platforms=android || true

          # Uygulama adını düzelt
          sed -i 's/android:label="gorbul"/android:label="GörBul"/g' android/app/src/main/AndroidManifest.xml || true
          sed -i 's/android:label="görbultaslak1"/android:label="GörBul"/g' android/app/src/main/AndroidManifest.xml || true

          # Firebase Google Services - settings.gradle (modern Flutter)
          sed -i 's/id "dev.flutter.flutter-plugin-loader" version "1.0.0"/id "dev.flutter.flutter-plugin-loader" version "1.0.0"\n    id "com.google.gms.google-services" version "4.4.1" apply false/' android/settings.gradle || true
          sed -i 's/id "dev.flutter.flutter-gradle-plugin"/id "dev.flutter.flutter-gradle-plugin"\n    id "com.google.gms.google-services"/' android/app/build.gradle || true

          # Eski Flutter proje yapısı (apply plugin yöntemi)
          sed -i 's/apply plugin: "com.android.application"/apply plugin: "com.android.application"\napply plugin: "com.google.gms.google-services"/' android/app/build.gradle || true
          sed -i 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.1"/' android/build.gradle || true

          # MinSdkVersion: Firebase için 23 gerekiyor
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle || true
          sed -i 's/minSdkVersion 21/minSdkVersion 23/' android/app/build.gradle || true
          sed -i 's/minSdkVersion 22/minSdkVersion 23/' android/app/build.gradle || true

      # Tüm Android mimarileri için FAT/Evrensel APK (tek dosya, her cihazda çalışır)
      - name: Build APK
        run: flutter build apk --release

      - name: Get Version Tag
        id: version
        run: echo "tag=v$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      # GitHub Release oluştur ve APK'yı yükle
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GörBul ${{ steps.version.outputs.tag }}"
          body: |
            ## GörBul - Kayıp Eşya Ağı

            Tüm Android cihazlarla uyumlu evrensel APK

            **Kurulum:**
            1. `app-release.apk` dosyasını indir
            2. Telefonda *Bilinmeyen kaynaklar*'a izin ver
            3. Yükle ve aç!
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Artifact olarak da yükle (yedek)
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorbul-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
