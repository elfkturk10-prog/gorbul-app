name: Build and Release Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Configure App Icon
        run: |
          # Sadece android'i aktifleştirip ios'u iptal eden config dosyasini pubspec'e ekle
          cat <<EOF >> pubspec.yaml
          flutter_launcher_icons:
            android: "launcher_icon"
            ios: false
            image_path: "assets/icon/app_icon.png"
          EOF
          dart run flutter_launcher_icons

      - name: Rename App to GörBul
        run: |
          sed -i 's/android:label="gorbul"/android:label="GörBul"/g' android/app/src/main/AndroidManifest.xml || true
          sed -i 's/android:label="görbultaslak1"/android:label="GörBul"/g' android/app/src/main/AndroidManifest.xml || true
          
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
