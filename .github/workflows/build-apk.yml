name: Build and Release Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Configure App Icon
        run: |
          # Sadece android'i aktifleştirip ios'u iptal eden config dosyasini pubspec'e ekle
          cat <<EOF >> pubspec.yaml
          flutter_launcher_icons:
            android: "launcher_icon"
            ios: false
            image_path: "assets/icon/app_icon.png"
          EOF
          dart run flutter_launcher_icons

      - name: Configure Target App & Firebase
        run: |
          # Eksik Android altyapısını yeniden oluştur
          flutter create . --platforms=android || true
          
          # App ismini düzelt
          sed -i 's/android:label="gorbul"/android:label="GörBul"/g' android/app/src/main/AndroidManifest.xml || true
          sed -i 's/android:label="görbultaslak1"/android:label="GörBul"/g' android/app/src/main/AndroidManifest.xml || true

          # settings.gradle (Modern Flutter plugins) içerisine google-services ekle
          sed -i 's/id "dev.flutter.flutter-plugin-loader" version "1.0.0"/id "dev.flutter.flutter-plugin-loader" version "1.0.0"\n    id "com.google.gms.google-services" version "4.4.1" apply false/' android/settings.gradle || true
          
          # android/app/build.gradle dosyasındaki plugins kismine google-services ekle
          sed -i 's/id "dev.flutter.flutter-gradle-plugin"/id "dev.flutter.flutter-gradle-plugin"\n    id "com.google.gms.google-services"/' android/app/build.gradle || true
          
          # build.gradle (Eski Flutter tarzı varsa)
          sed -i 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.1"/' android/build.gradle || true
          sed -i 's/apply plugin: "com.android.application"/apply plugin: "com.android.application"\napply plugin: "com.google.gms.google-services"/' android/app/build.gradle || true

          # Multidex ve MinSdkVersion (Firestore hatasını engellemek için)
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle || true
          
          # minSdkVersion eger 21 falansa her halükarda 23 yapalim
          sed -i 's/minSdkVersion 21/minSdkVersion 23/' android/app/build.gradle || true
          
      - name: Build APK
        run: flutter build apk --release

        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
