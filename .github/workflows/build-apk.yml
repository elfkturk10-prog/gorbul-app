name: Build and Release GörBul APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Universal APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Configure Android & Firebase
        run: |
          # Backup special files
          mkdir -p /tmp/android_backup/res/drawable
          cp android/app/google-services.json /tmp/android_backup/ || true
          cp -r android/app/src/main/res/drawable/* /tmp/android_backup/res/drawable/ || true
          
          # Remove and recreate Android project with correct package name
          rm -rf android
          flutter create --platforms=android --org com.gorbul --project-name app .
          
          # Restore backups
          cp /tmp/android_backup/google-services.json android/app/ || true
          cp -r /tmp/android_backup/res/drawable/* android/app/src/main/res/drawable/ || true
          
          # Use Python to safely patch gradle files
          python3 -c "
          import os

          # 1. Patch android/settings.gradle (Add GMS)
          with open('android/settings.gradle', 'r') as f: content = f.read()
          if 'com.google.gms.google-services' not in content:
              content = content.replace('plugins {', 'plugins {\n    id \"com.google.gms.google-services\" version \"4.4.1\" apply false')
          with open('android/settings.gradle', 'w') as f: f.write(content)

          # 2. Patch root android/build.gradle (Global Fix for Plugins)
          # We define a global 'flutter' object that geolocator and others look for
          patch = \"\"\"
          allprojects {
              ext.flutter = [
                  compileSdkVersion: 35,
                  targetSdkVersion: 35,
                  minSdkVersion: 23
              ]
              
              // Standard version forcing for all subprojects
              subprojects {
                  afterEvaluate { project ->
                      if (project.hasProperty('android')) {
                          project.android {
                              compileSdkVersion 35
                              buildToolsVersion '35.0.0'
                              defaultConfig {
                                  targetSdkVersion 35
                                  minSdkVersion 23
                              }
                          }
                      }
                  }
              }
          }
          \"\"\"
          with open('android/build.gradle', 'w') as f: f.write(patch)

          # 3. Patch android/app/build.gradle (Standard setup)
          with open('android/app/build.gradle', 'r') as f: content = f.read()
          # Add GMS plugin
          if 'com.google.gms.google-services' not in content:
              content = content.replace('id \"dev.flutter.flutter-gradle-plugin\"', 'id \"dev.flutter.flutter-gradle-plugin\"\n    id \"com.google.gms.google-services\"')
          # Fix JVM targets
          if 'compileOptions {' not in content:
              content = content.replace('android {', 'android {\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n    kotlinOptions {\n        jvmTarget = \"1.8\"\n    }')
          # Force app versions
          content = content.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 35')
          content = content.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
          content = content.replace('targetSdk = flutter.targetSdkVersion', 'targetSdk = 35')
          with open('android/app/build.gradle', 'w') as f: f.write(content)
          "

          # Fix App Name
          sed -i 's/android:label=\"app\"/android:label=\"GörBul\"/g' android/app/src/main/AndroidManifest.xml || true
          
          # Final build checks
          echo \"flutter.sdk=$FLUTTER_ROOT\" > android/local.properties
          echo \"sdk.dir=$ANDROID_SDK_ROOT\" >> android/local.properties
          yes | flutter doctor --android-licenses || true



          # Android Lisanslarını Onayla (Build başarısı için kritik)
          yes | flutter doctor --android-licenses || true

      # Tüm Android mimarileri için FAT/Evrensel APK (tek dosya, her cihazda çalışır)
      - name: Build APK
        run: flutter build apk --release --build-name=1.0.0 --build-number=1 --no-tree-shake-icons

      - name: Get Version Tag
        id: version
        run: echo "tag=v$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      # GitHub Release oluştur ve APK'yı yükle
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GörBul ${{ steps.version.outputs.tag }}"
          body: |
            ## GörBul - Kayıp Eşya Ağı

            Tüm Android cihazlarla uyumlu evrensel APK

            **Kurulum:**
            1. `app-release.apk` dosyasını indir
            2. Telefonda *Bilinmeyen kaynaklar*'a izin ver
            3. Yükle ve aç!
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Artifact olarak da yükle (yedek)
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorbul-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
